        let currentQuestion = 0;
        let answers = [];

        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(page => {
                page.classList.remove('active');
            });
            document.getElementById(pageId).classList.add('active');
        }

        function startTest() {
            currentQuestion = 0;
            answers = [];
            showPage('testPage');
            displayQuestion();
        }

        function displayQuestion() {
            const question = questions[currentQuestion];
            document.getElementById('questionNumber').textContent = `${currentQuestion + 1} / ${questions.length}`;
            document.getElementById('questionText').textContent = question.question;

            const progressPercent = ((currentQuestion) / questions.length) * 100;
            document.getElementById('progressFill').style.width = `${progressPercent}%`;

            const optionsContainer = document.getElementById('optionsContainer');
            optionsContainer.innerHTML = '';

            question.options.forEach((option, index) => {
                const optionElement = document.createElement('div');
                optionElement.className = 'option';
                optionElement.textContent = option.text;
                optionElement.onclick = () => selectOption(option.type);
                optionsContainer.appendChild(optionElement);
            });
        }

        function selectOption(optionType) {
            answers.push(optionType);

            if (currentQuestion < questions.length - 1) {
                currentQuestion++;
                displayQuestion();
            } else {
                showResult();
            }
        }

        function calculateResult() {
            const aCount = answers.filter(a => a === 'A').length;
            const bCount = answers.filter(a => a === 'B').length;

            // 根据A/B比例选择不同的人格
            let personalityIndex;
            if (aCount > bCount + 3) {
                // 偏向A的结果
                const aPersonalities = [0, 2, 4, 6, 8, 10, 12, 14];
                personalityIndex = aPersonalities[Math.floor(Math.random() * aPersonalities.length)];
            } else if (bCount > aCount + 3) {
                // 偏向B的结果
                const bPersonalities = [1, 3, 5, 7, 9, 11, 13, 15];
                personalityIndex = bPersonalities[Math.floor(Math.random() * bPersonalities.length)];
            } else {
                // 均衡型
                personalityIndex = Math.floor(Math.random() * personalities.length);
            }

            return personalities[personalityIndex];
        }

        function showResult() {
            const result = calculateResult();

            document.getElementById('resultEmoji').textContent = result.emoji;
            document.getElementById('resultName').textContent = result.name;

            const tagsContainer = document.getElementById('resultTags');
            tagsContainer.innerHTML = '';
            result.tags.forEach(tag => {
                const tagElement = document.createElement('div');
                tagElement.className = 'tag';
                tagElement.textContent = tag;
                tagsContainer.appendChild(tagElement);
            });

            document.getElementById('resultDescription').textContent = result.description;

            showPage('resultPage');
            document.getElementById('progressFill').style.width = '100%';
        }

        function restartTest() {
            document.getElementById('shareResult').classList.remove('show');
            startTest();
        }

        function shareResult() {
            const result = calculateResult();
            const shareText = `🎭 我的SBTI人格测试结果：${result.name} ${result.emoji}\n\n${result.description}\n\n你也来测测吧！👇\nhttps://sbti-test.com`;
            document.getElementById('shareText').value = shareText;
            document.getElementById('shareResult').classList.add('show');

            // 自动选中文本
            const textarea = document.getElementById('shareText');
            textarea.select();
            textarea.setSelectionRange(0, textarea.value.length);
        }
    </script>
</body>
</html>
